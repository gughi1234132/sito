<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <!-- Importiamo i font da Google Fonts per la massima compatibilità -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&amp;family=Alex+Brush&amp;display=swap');
      
      .kroma-text { 
        font-family: 'Playfair Display', serif; 
        font-size: 52px; 
        fill: #2C1A1D; /* Borgogna Scuro / Antracite */
        font-weight: 600; 
        letter-spacing: 6px; 
      }
      .atelier-text { 
        font-family: 'Alex Brush', cursive; 
        font-size: 38px; 
        fill: #A68A64; /* Oro Antico / Rame */
      }
      .monogram-k { 
        font-family: 'Playfair Display', serif; 
        font-size: 72px; 
        fill: #2C1A1D; 
        font-weight: 600; 
      }
      .monogram-a { 
        font-family: 'Playfair Display', serif; 
        font-size: 64px; 
        fill: #A68A64; 
        font-style: italic; 
      }
    </style>
  </defs>

  <!-- Monogramma (K & A intrecciati visivamente) -->
  <g transform="translate(30, 95)">
    <text x="0" y="0" class="monogram-k">K</text>
    <text x="35" y="15" class="monogram-a">A</text>
  </g>

  <!-- Linea Divisoria Sartoriale -->
  <line x1="145" y1="35" x2="145" y2="115" stroke="#E5DCCC" stroke-width="2" />

  <!-- Wordmark Principale -->
  <g transform="translate(180, 75)">
    <text x="0" y="0" class="kroma-text">KROMA</text>
    <text x="5" y="40" class="atelier-text">Atelier</text>
  </g>
</svg>
