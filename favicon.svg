<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&amp;display=swap');
      .monogram-k { font-family: 'Playfair Display', serif; font-size: 58px; fill: #2C1A1D; font-weight: 600; }
      .monogram-a { font-family: 'Playfair Display', serif; font-size: 52px; fill: #A68A64; font-style: italic; }
    </style>
  </defs>
  <!-- Sfondo trasparente, il monogramma è centrato -->
  <g transform="translate(15, 70)">
    <text x="0" y="0" class="monogram-k">K</text>
    <text x="28" y="10" class="monogram-a">A</text>
  </g>
</svg>
